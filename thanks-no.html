<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתגעגע</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh;
            font-family: 'Assistant', sans-serif; 
            text-align: center;
            background-color: #fcfcfc; /* רקע זהה לחלוטין לדף הראשי */
            overflow: hidden;
        }
        
        /* רקע העלים - תואם ב-100% לדף הראשי ברמת שקיפות של 45% */
        .watercolor-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('bp.png'); 
            background-size: cover; 
            background-position: center; 
            opacity: 0.45; /* אחידות מלאה */
            z-index: 0; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.95); /* מוגן מפני הרקע הכהה יותר */
            padding: 50px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 45px rgba(58, 83, 64, 0.12); 
            max-width: 420px; 
            width: 90%; 
            margin: 0 auto; 
            z-index: 10; 
            position: relative;
            border: 1px solid rgba(191, 163, 83, 0.25); 
        }
        
        h1 { 
            color: #3d5442; 
            font-family: 'Arimo', sans-serif; 
            margin-top: 0; 
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 32px;
        }
        
        p { 
            color: #5a636c; 
            font-size: 19px; 
            line-height: 1.6; 
            margin: 12px 0; 
        }
        
        .back-btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 15px 35px; 
            background: linear-gradient(135deg, #3d5442 0%, #4e6b54 100%); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(61, 84, 66, 0.25);
        }
        
        .back-btn:hover { 
            opacity: 0.95;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- אלמנט הרקע האחיד -->
    <div class="watercolor-bg"></div>

    <div class="card">
        <h1>תודה על העדכון</h1>
        <p>מצטערים שלא תוכלו להשתתף בבר המצווה של אוריאל</p>
        <p>נשמח לחגוג יחד בשמחות הבאות!</p>
        <a href="https://yispo.github.io/uriel-bar-mitzvah/" class="back-btn">חזרה לדף הבית</a>
    </div>

</body>
</html>
