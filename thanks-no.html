<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתגעגע</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh;
            font-family: 'Assistant', sans-serif; 
            text-align: center;
            /* הגדרת תמונת הרקע bp.png */
            background-image: url('bp.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }
        
        /* יצירת עלים וקטוריים עדינים בקצוות (סגנון גינקו) דרך CSS */
        body::before, body::after {
            content: "";
            position: absolute;
            opacity: 0.18;
            z-index: 0;
        }
        
        /* עלים עליונים */
        body::before {
            top: -60px;
            left: -60px;
            width: 350px;
            height: 350px;
            background: 
                radial-gradient(ellipse at 40% 40%, #c0cac0 0%, transparent 65%), /* ירוק-סירנה */
                radial-gradient(ellipse at 60% 60%, #e0d0a0 0%, transparent 70%); /* זהב חיוור */
            border-radius: 50%;
            filter: blur(40px);
        }
        
        /* עלים תחתונים */
        body::after {
            bottom: -70px;
            right: -70px;
            width: 400px;
            height: 400px;
            background: 
                radial-gradient(ellipse at 60% 60%, #c0cac0 0%, transparent 65%), /* ירוק-סירנה */
                radial-gradient(ellipse at 50% 70%, #e0d0a0 0%, transparent 70%); /* זהב חיוור */
            border-radius: 50%;
            filter: blur(50px);
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 50px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 45px rgba(58, 83, 64, 0.1); 
            max-width: 420px; 
            width: 90%; 
            margin: 0 auto; 
            z-index: 1;
            position: relative;
            /* מסגרת זהב דקה בהשראת ההזמנה */
            border: 1px solid rgba(191, 163, 83, 0.2); 
        }
        
        h1 { 
            color: #3a5340; /* ירוק-זית עמוק מההזמנה */
            font-family: 'Arimo', sans-serif; 
            margin-top: 0; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        p { 
            color: #5a636c; /* אפור-כחלחל עדין יותר */
            font-size: 19px; 
            line-height: 1.6; 
            margin: 12px 0; 
        }
        
        .back-btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 15px 35px; 
            background-color: #879c8b; /* ירוק-זית בהיר מההזמנה */
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(191, 163, 83, 0.4); /* גבול זהב עדין בכפתור */
            box-shadow: 0 4px 10px rgba(135, 156, 139, 0.3);
        }
        
        .back-btn:hover { 
            background-color: #3a5340; /* מעבר לירוק-זית עמוק */
            box-shadow: 0 6px 15px rgba(58, 83, 64, 0.35);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>תודה על העדכון</h1>
        <p>מצטערים שלא תוכלו להשתתף בבר המצווה של אוריאל</p>
        <p>נשמח לחגוג יחד בשמחות הבאות!</p>
        <a href="https://yispo.github.io/uriel-bar-mitzvah/" class="back-btn">חזרה לדף הבית</a>
    </div>

</body>
</html>
