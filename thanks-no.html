<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נתגעגע</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Assistant', sans-serif; 
            text-align: center;
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 100%; 
        }
        h1 { color: #7f1d1d; font-family: 'Arimo', sans-serif; }
        p { color: #4a5568; font-size: 18px; line-height: 1.6; }
        .back-btn { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 10px 20px; 
            background-color: #1a2a44; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>תודה על העדכון</h1>
        <p1>מצטערים שלא תוכלו להשתתף בבר המצווה של אוריאל.</p>
        <p>נשמח לחגוג יחד בשמחות הבאות!</p>
        <a href="https://yispo.github.io/uriel-bar-mitzvah/" class="back-btn">חזרה לדף הבית</a>
    </div>

</body>
</html>
