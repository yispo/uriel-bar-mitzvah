<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתגעגע</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh;
            font-family: 'Assistant', sans-serif; 
            text-align: center;
            /* רקע בהשראת ההזמנה: לבן-קרם עם כתמי זהב וירוק עדינים בקצוות */
            background-color: #fafbfa;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(135, 156, 139, 0.1) 0%, transparent 40%), /* ירוק עדין */
                radial-gradient(circle at 90% 90%, rgba(135, 156, 139, 0.1) 0%, transparent 40%), /* ירוק עדין */
                radial-gradient(circle at 80% 20%, rgba(191, 163, 83, 0.05) 0%, transparent 30%); /* זהב עדין */
            position: relative;
        }
        
        /* יצירת עלים וקטוריים עדינים בקצוות דרך CSS */
        body::before, body::after {
            content: "";
            position: absolute;
            opacity: 0.15;
            z-index: 0;
        }
        
        /* עלים עליונים */
        body::before {
            top: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background: 
                radial-gradient(ellipse at 30% 30%, #a7bca7 0%, transparent 60%), /* ירוק */
                radial-gradient(ellipse at 50% 50%, #bfa353 0%, transparent 70%); /* זהב */
            border-radius: 50%;
            filter: blur(40px);
        }
        
        /* עלים תחתונים */
        body::after {
            bottom: -50px;
            right: -50px;
            width: 350px;
            height: 350px;
            background: 
                radial-gradient(ellipse at 70% 70%, #a7bca7 0%, transparent 60%), /* ירוק */
                radial-gradient(ellipse at 60% 80%, #bfa353 0%, transparent 70%); /* זהב */
            border-radius: 50%;
            filter: blur(50px);
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 50px 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(58, 83, 64, 0.1); 
            max-width: 420px; 
            width: 90%; 
            margin: 0 auto; 
            z-index: 1;
            position: relative;
            border: 1px solid rgba(191, 163, 83, 0.15); /* מסגרת זהב דקה */
        }
        
        h1 { 
            color: #3a5340; /* ירוק-זית עמוק בהשראת ההזמנה */
            font-family: 'Arimo', sans-serif; 
            margin-top: 0; 
            font-weight: 700;
        }
        
        p { 
            color: #5a636c; 
            font-size: 19px; 
            line-height: 1.6; 
            margin: 12px 0; 
        }
        
        .back-btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 14px 30px; 
            background-color: #879c8b; /* ירוק-סירנה רך בהשראת ההזמנה */
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            transition: all 0.3s;
            font-weight: 600;
            border: 1px solid rgba(191, 163, 83, 0.3); /* גבול זהב עדין */
            box-shadow: 0 4px 6px rgba(135, 156, 139, 0.2);
        }
        
        .back-btn:hover { 
            background-color: #3a5340; /* מעבר לירוק-זית עמוק */
            box-shadow: 0 6px 12px rgba(58, 83, 64, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>תודה על העדכון</h1>
        <p>מצטערים שלא תוכלו להשתתף בבר המצווה של אוריאל.</p>
        <p>נשמח לחגוג יחד בשמחות הבאות!</p>
        <a href="https://yispo.github.io/uriel-bar-mitzvah/" class="back-btn">חזרה לדף הבית</a>
    </div>

</body>
</html>
