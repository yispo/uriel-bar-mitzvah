<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תודה על העדכון</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f5f2eb;
            font-family: 'Assistant', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* שימוש ב-dvh למרכוז מושלם ללא רווחים */
            min-height: 100dvh; 
            color: #4a3e3d;
        }

        .card-container {
            width: 90%;
            max-width: 420px;
            background: #ffffff;
            /* הסרת ה-margin כדי לתת ל-flex של ה-body לשלוט במיקום */
            margin: 0; 
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eadecc;
        }

        .card-content {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
        }

        .bsd {
            font-size: 12px;
            color: #a39683;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 32px;
            color: #bfa15f;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #5c524f;
            margin: 0 0 30px 0;
            padding: 0 10px;
        }

        .calendar-btn {
            display: inline-block;
            background-color: #bfa15f;
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(191, 161, 95, 0.2);
            margin: 10px auto 25px auto;
            width: auto;
            max-width: 90%;
        }

        .calendar-btn:active {
            background-color: #a68a4c;
        }

        .signature {
            font-size: 20px;
            color: #7c6c5a;
            margin-top: 15px;
            font-weight: 600;
            border-top: 1px dashed #eadecc;
            padding-top: 20px;
            display: inline-block;
            width: 80%;
        }

        .icon {
            margin-top: 20px;
            font-size: 22px;
            color: #bfa15f;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-content">
            <div class="bsd">בס"ד</div>
            
            <h1>תודה על העדכון</h1>
            
            <p>אישורכם התקבל בהצלחה,<br>לקראת בר המצווה של אוריאל.</p>
            
            <a href="https://calendar.app.google/Tx5ptdLKvK8nZZgi6" target="_blank" class="calendar-btn">
                שמירה ליומן Google 📅
            </a>
            
            <br>
            
            <div class="signature">
                משפחת פולק
            </div>
            
            <div class="icon">✨</div>
        </div>
    </div>

</body>
</html>
