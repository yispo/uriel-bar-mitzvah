<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תודה על העדכון</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc; /* צבע רקע זהה לחלוטין לשאר הדפים */
            font-family: 'Assistant', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            color: #4a5568;
            overflow: hidden;
            position: relative;
        }

        /* רקע העלים - תואם ב-100% לשאר הדפים ברמת שקיפות מאוזנת של 45% */
        .watercolor-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('bp.png'); 
            background-size: cover; 
            background-position: center; 
            opacity: 0.45; /* אחידות מלאה */
            z-index: 0; 
        }

        .card-container {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95); /* מוגן ומובלט מעל הרקע */
            margin: 0; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(58, 83, 64, 0.12); 
            overflow: hidden;
            z-index: 10;
            position: relative;
            border: 1px solid rgba(191, 163, 83, 0.25); /* מסגרת זהב תואמת ואחידה */
        }

        .card-content {
            padding: 50px 20px;
            text-align: center;
            width: 100%;
        }

        .bsd {
            font-size: 12px;
            color: #a39683;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        h1 {
            color: #3d5442; /* צבע ירוק זית אחיד */
            font-family: 'Arimo', sans-serif; 
            margin: 0 0 20px 0; 
            font-weight: 700;
            font-size: 32px;
        }

        p {
            color: #5a636c; 
            font-size: 19px; 
            line-height: 1.6; 
            margin: 0 0 30px 0; 
            padding: 0 10px;
            font-weight: 400;
        }

        .calendar-btn {
            display: inline-block;
            background: linear-gradient(135deg, #3d5442 0%, #4e6b54 100%); /* עיצוב כפתור יציב ומקצועי */
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(61, 84, 66, 0.25);
            margin: 10px auto 25px auto;
            width: auto;
            max-width: 90%;
            border: none;
        }

        .calendar-btn:hover { 
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .calendar-btn:active {
            transform: translateY(0);
        }

        .signature {
            color: #3d5442; 
            font-size: 20px;
            margin-top: 15px;
            font-weight: 600;
            border-top: 1px dashed rgba(191, 163, 83, 0.15); 
            padding-top: 20px;
            display: inline-block;
            width: 80%;
        }

        .icon {
            margin-top: 20px;
            font-size: 22px;
            color: #bfa353; 
        }
    </style>
</head>
<body>

    <!-- שכבת הרקע האחידה -->
    <div class="watercolor-bg"></div>

    <div class="card-container">
        <div class="card-content">
            <div class="bsd">בס"ד</div>
            
            <h1>תודה על העדכון</h1>
            
            <p>אישורכם התקבל בהצלחה</p>
            
            <!-- קישור יומן גוגל מעודכן ומקודד למניעת שבירת לינקים -->
            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=%d7%91%d7%a3+%d7%9e%d7%a6%d7%95%d7%94+%d7%90%d7%a8%d7%99%d7%90%d7%9c+%d7%a4%d7%9c%d7%a7&dates=20260901T170000Z/20260901T200000Z&details=%d7%a0%d7%9e%d7%97+%d7%9c%d7%a8%d7%90%d7%aa%d7%9b%d7%9d+%d7%9比%d7%9f+%d7%90%d7%a8%d7%97%d7%99%d7%a0+%d7%91%d7%91%d7%a3+%d7%94%d7%9e%d7%a6%d7%95%d7%94&location=%d7%90%d7%9c%d7%9d+%d7%a9%d7%9比%d7%94%d7%9c%d7%95%d7%99,+%d7%a8%d7%97%d7%91+%d7%a0%d7%97%d7%9c+%d7%a9%d7%a8%d7%a7+25,+%d7%91%d7%99%d7%aa+%d7%a9%d7%9e%d7%a9" target="_blank" class="calendar-btn">
                שמירה ליומן Google 📅
            </a>
            
            <br>
            
            <div class="signature">
                משפחת פולק
            </div>
            
            <div class="icon">✨</div>
        </div>
    </div>

</body>
</html>
