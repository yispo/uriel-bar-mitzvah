<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תודה על העדכון</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* רקע משולב בהשראת ההזמנה: לבן-קרם עם כתמי זהב וירוק עדינים בקצוות */
            background-color: #fafbfa;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(135, 156, 139, 0.1) 0%, transparent 40%), /* ירוק עדין */
                radial-gradient(circle at 90% 90%, rgba(135, 156, 139, 0.1) 0%, transparent 40%), /* ירוק עדין */
                radial-gradient(circle at 80% 20%, rgba(191, 163, 83, 0.05) 0%, transparent 30%); /* זהב עדין */
            position: relative;
            font-family: 'Assistant', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            color: #4a5568;
            overflow: hidden;
        }

        /* יצירת עלים וקטוריים עדינים בקצוות דרך CSS */
        body::before, body::after {
            content: "";
            position: absolute;
            opacity: 0.15;
            z-index: 0;
        }
        
        /* עלים עליונים */
        body::before {
            top: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background: 
                radial-gradient(ellipse at 30% 30%, #a7bca7 0%, transparent 60%), /* ירוק */
                radial-gradient(ellipse at 50% 50%, #bfa353 0%, transparent 70%); /* זהב */
            border-radius: 50%;
            filter: blur(40px);
        }
        
        /* עלים תחתונים */
        body::after {
            bottom: -50px;
            right: -50px;
            width: 350px;
            height: 350px;
            background: 
                radial-gradient(ellipse at 70% 70%, #a7bca7 0%, transparent 60%), /* ירוק */
                radial-gradient(ellipse at 60% 80%, #bfa353 0%, transparent 70%); /* זהב */
            border-radius: 50%;
            filter: blur(50px);
        }

        .card-container {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96); 
            margin: 0; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(58, 83, 64, 0.1); 
            overflow: hidden;
            z-index: 1;
            position: relative;
            border: 1px solid rgba(191, 163, 83, 0.15); /* מסגרת זהב דקה */
        }

        .card-content {
            padding: 50px 20px;
            text-align: center;
            width: 100%;
        }

        .bsd {
            font-size: 12px;
            color: #a39683;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        h1 {
            color: #3a5340; /* ירוק-זית עמוק בהשראת ההזמנה */
            font-family: 'Arimo', sans-serif; 
            margin: 0 0 20px 0; 
            font-weight: 700;
            font-size: 32px;
        }

        p {
            color: #5a636c; 
            font-size: 19px; 
            line-height: 1.6; 
            margin: 0 0 30px 0; 
            padding: 0 10px;
            font-weight: 400;
        }

        .calendar-btn {
            display: inline-block;
            background-color: #879c8b; /* ירוק-סירנה רך בהשראת ההזמנה */
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px; 
            transition: all 0.3s;
            border: 1px solid rgba(191, 163, 83, 0.3); /* גבול זהב עדין */
            box-shadow: 0 4px 6px rgba(135, 156, 139, 0.2);
            margin: 10px auto 25px auto;
            width: auto;
            max-width: 90%;
        }

        .calendar-btn:hover { 
            background-color: #3a5340; /* מעבר לירוק-זית עמוק */
            box-shadow: 0 6px 12px rgba(58, 83, 64, 0.25);
            transform: translateY(-2px);
        }

        .calendar-btn:active {
            background-color: #3a5340;
            transform: translateY(0);
        }

        .signature {
            color: #3a5340; /* ירוק-זית עמוק */
            font-size: 20px;
            margin-top: 15px;
            font-weight: 600;
            border-top: 1px dashed rgba(191, 163, 83, 0.15); /* גבול זהב מרוסק עדין */
            padding-top: 20px;
            display: inline-block;
            width: 80%;
        }

        .icon {
            margin-top: 20px;
            font-size: 22px;
            color: #bfa353; /* זהב */
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-content">
            <div class="bsd">בס"ד</div>
            
            <h1>תודה על העדכון</h1>
            
            <p>אישורכם התקבל בהצלחה</p>
            
               <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=בר+מצווה+אוריאל+פולק&dates=20260901T170000Z/20260901T200000Z&details=נשמח+לראותכם+בין+אורחינו+בבר+המצווה&location=אולם+שבט+הלוי,+רחוב+נחל+שורק+25,+בית+שמש&pli=1&sf=true&output=xml#eventpage_6" target="_blank" class="calendar-btn">
                שמירה ליומן Google 📅
            </a>
            
            <br>
            
            <div class="signature">
                משפחת פולק
            </div>
            
            <div class="icon">✨</div>
        </div>
    </div>

</body>
</html>
