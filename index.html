<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>אישור הגעה - אוריאל יצחק</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { box-sizing: border-box; }
    /* שינוי ה-body למרכוז מלא ומדויק ללא רווחים מיותרים */
    body { 
        margin: 0; 
        padding: 0; 
        background-color: #f0f2f5; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100dvh; 
        font-family: 'Assistant', sans-serif;
    }
    .watercolor-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.unsplash.com/photo-1525310072745-f49212b5ac6d?q=80&w=1000&auto=format&fit=cover'); background-size: cover; background-position: center; opacity: 0.3; z-index: 0; }
    .form-card { position: relative; z-index: 10; background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px 15px; width: 95%; max-width: 480px; box-shadow: 0 15px 35px rgba(26, 42, 68, 0.15); text-align: center; }
    h1 { font-family: 'Arimo', sans-serif; color: #1a2a44; font-size: 32px; margin: 0 0 5px 0; }
    .subtitle { color: #d4af37; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .name-input, .note-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-size: 16px; text-align: center; font-family: inherit; }
    .note-input { height: 80px; resize: none; text-align: right; }
    .rsvp-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .toggle-btn { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    .toggle-btn.active-yes { background-color: #1a2a44; color: white; border-color: #1a2a44; }
    .toggle-btn.active-no { background-color: #7f1d1d; color: white; border-color: #7f1d1d; }
    .details-section { display: none; margin-bottom: 20px; }
    .counter-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
    .control-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #d4af37; background: white; color: #d4af37; cursor: pointer; font-size: 20px; font-weight: bold; }
    .counter-value { font-size: 24px; font-weight: 700; color: #1a2a44; margin: 0 15px; }
    .submit-btn { background: linear-gradient(135deg, #1a2a44 0%, #2e4d68 100%); color: white; border: none; padding: 12px; font-weight: 700; border-radius: 50px; cursor: pointer; width: 100%; display: none; margin-top: 10px; }
</style>
</head>
<body>

<div class="watercolor-bg"></div>

<form id="realRsvpForm"
      action="https://docs.google.com/forms/d/e/1FAIpQLSf__RAqcS81CkBbmSEH6TqslCMG3OxURhXNhUbhwfhYPHo-aQ/formResponse"
      method="POST"
      target="hidden_iframe"
      onsubmit="submitted=true;">
    <input type="hidden" name="entry.1433589886" id="gName">
    <input type="hidden" name="entry.1597149823" id="gGuests">
    <input type="hidden" name="entry.1580638204" id="gNotes">

    <div class="form-card">
        <h1>אישור הגעה</h1>
        <div class="subtitle">נשמח לראותכם בין אורחינו בבר המצווה</div>
        <input type="text" id="guestName" class="name-input" placeholder="שם מלא" required>

        <div class="rsvp-toggle">
            <button type="button" class="toggle-btn" id="btnYes" onclick="toggleSelection('yes')">
                <i class="fa-solid fa-check"></i> <span>נגיע!</span>
            </button>
            <button type="button" class="toggle-btn" id="btnNo" onclick="toggleSelection('no')">
                <i class="fa-solid fa-xmark"></i> <span>לא נגיע</span>
            </button>
        </div>

        <div id="detailsSection" class="details-section">
            <div class="counter-section">
                <span style="margin-bottom: 10px; font-weight: bold;">כמה אתם?</span>
                <div style="display: flex; align-items: center;">
                    <button type="button" class="control-btn" onclick="updateCount(-1)">-</button>
                    <span class="counter-value" id="guestCount">1</span>
                    <button type="button" class="control-btn" onclick="updateCount(1)">+</button>
                </div>
            </div>
            <textarea id="guestNotes" class="note-input" placeholder="הערות מיוחדות"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">שמירה</button>
    </div>
</form>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="handleResponse()"></iframe>

<script>
    var submitted = false;
    let count = 1;
    let isAttending = null;

    function toggleSelection(type) {
        isAttending = (type === 'yes');
        document.getElementById('btnYes').className = isAttending ? 'toggle-btn active-yes' : 'toggle-btn';
        document.getElementById('btnNo').className = !isAttending ? 'toggle-btn active-no' : 'toggle-btn';
        document.getElementById('detailsSection').style.display = isAttending ? 'block' : 'none';
        document.getElementById('submitBtn').style.display = 'block';
    }

    function updateCount(val) {
        count = Math.max(1, count + val);
        document.getElementById('guestCount').innerText = count;
    }

    function handleResponse() {
        if (submitted) {
            if (isAttending) {
                window.location.href = 'https://yispo.github.io/uriel-bar-mitzvah/thanks.html';
            } else {
                window.location.href = 'https://yispo.github.io/uriel-bar-mitzvah/thanks-no.html';
            }
        }
    }

    document.getElementById('realRsvpForm').addEventListener('submit', function(e) {
        document.getElementById('gName').value = document.getElementById('guestName').value;
        document.getElementById('gGuests').value = isAttending ? count : 0;
        document.getElementById('gNotes').value = document.getElementById('guestNotes').value;
    });
</script>

</body>
</html>
