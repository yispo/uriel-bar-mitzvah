<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אישור הגעה - אוריאל יצחק</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 10px;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Assistant', sans-serif;
            overflow-x: hidden;
        }
        .watercolor-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1525310072745-f49212b5ac6d?q=80&w=1000&auto=format&fit=cover');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 0;
        }
        .form-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 20px 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(26, 42, 68, 0.15);
            text-align: center;
            margin: auto;
        }
        h1 {
            font-family: 'Arimo', sans-serif;
            color: #1a2a44;
            font-size: 30px;
            margin: 0 0 5px 0;
        }
        .subtitle {
            color: #d4af37;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        /* התאמה מושלמת של הטופס המוטמע */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 520px; /* גובה מותאם לטופס קצר */
            overflow: hidden;
            border-radius: 12px;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer-info {
            margin-top: 15px;
            font-size: 13px;
            color: #1a2a44;
            font-weight: 600;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="watercolor-bg"></div>

<div class="form-card">
    <h1>אישור הגעה</h1>
    <div class="subtitle">נשמח לראותכם בין אורחנו <br>בשמחת בר המצווה של אוריאל יצחק</div>

    <div class="iframe-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf__RAqcS81CkBbmSEH6TqslCMG3OxURhXNhUbhwfhYPHo-aQ/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">טוען...</iframe>
    </div>
    
    <div class="footer-info">
        אולם "שבט הלוי", נחל שורק 25, בית שמש
    </div>
</div>

</body>
</html>
