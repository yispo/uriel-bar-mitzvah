<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אישור הגעה - אוריאל יצחק</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 10px;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Assistant', sans-serif;
            position: relative;
        }
        .watercolor-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=1000&auto=format&fit=cover');
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            z-index: 0;
        }
        .form-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 24px;
            padding: 35px 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(26, 42, 68, 0.12);
            text-align: center;
        }
        h1 {
            font-family: 'Arimo', sans-serif;
            color: #1a2a44;
            font-size: 38px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }
        .subtitle {
            color: #bfa15f;
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .name-input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            font-family: inherit;
            background-color: #fcfcfc;
        }
        .rsvp-toggle {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .toggle-btn {
            flex: 1;
            padding: 14px 10px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .toggle-btn.active-yes { background-color: #1a2a44; color: white; border-color: #1a2a44; }
        .toggle-btn.active-no { background-color: #881337; color: white; border-color: #881337; }
        .toggle-btn p { margin: 0; font-size: 13px; opacity: 0.85; }
        .toggle-btn i { font-size: 20px; }
        .toggle-btn span { font-size: 17px; font-weight: 700; }
        .counter-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .counter-group {
            background: #fafafa;
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #f1f1f1;
        }
        .counter-label {
            font-size: 16px;
            font-weight: 600;
            color: #1a2a44;
            margin-bottom: 10px;
            display: block;
        }
        .counter-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .control-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid #bfa15f;
            background: white;
            color: #bfa15f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            font-weight: bold;
        }
        .counter-value { font-size: 22px; font-weight: 700; color: #1a2a44; width: 25px; }
        .submit-btn {
            background: linear-gradient(135deg, #1a2a44 0%, #2a4365 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 19px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(26, 42, 68, 0.2);
        }
        .footer-info {
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="watercolor-bg"></div>

<div class="form-card">
    <h1>אישור הגעה</h1>
    <div class="subtitle">נשמח לראותכם בין אורחנו <br>בשמחת בר המצווה של אוריאל יצחק</div>

    <input type="text" id="guestName" class="name-input" placeholder="נא לכתוב את שמכם המלא" required>

    <div class="rsvp-toggle">
        <button type="button" class="toggle-btn active-yes" id="btnYes" onclick="document.getElementById('btnYes').className='toggle-btn active-yes'; document.getElementById('btnNo').className='toggle-btn'; document.getElementById('counters').style.opacity='1'; document.getElementById('counters').style.pointerEvents='auto'; document.getElementById('menCount').innerText='1'; document.getElementById('womenCount').innerText='1';">
            <i class="fa-solid fa-check"></i>
            <span>בטח שנגיע!</span>
            <p>נשמח לחגוג איתכם</p>
        </button>
        <button type="button" class="toggle-btn" id="btnNo" onclick="document.getElementById('btnYes').className='toggle-btn'; document.getElementById('btnNo').className='toggle-btn active-no'; document.getElementById('counters').style.opacity='0.3'; document.getElementById('counters').style.pointerEvents='none'; document.getElementById('menCount').innerText='0'; document.getElementById('womenCount').innerText='0';">
            <i class="fa-solid fa-xmark"></i>
            <span>לא נוכל להגיע</span>
            <p>נשמח לחגוג בשמחות הבאות</p>
        </button>
    </div>

    <div class="counter-section" id="counters">
        <div class="counter-group">
            <span class="counter-label">כמות גברים</span>
            <div class="counter-controls">
                <button type="button" class="control-btn" onclick="var val=parseInt(document.getElementById('menCount').innerText); if(val>0){document.getElementById('menCount').innerText=val-1;}">-</button>
                <span class="counter-value" id="menCount">1</span>
                <button type="button" class="control-btn" onclick="var val=parseInt(document.getElementById('menCount').innerText); document.getElementById('menCount').innerText=val+1;">+</button>
            </div>
        </div>
        <div class="counter-group">
            <span class="counter-label">כמות נשים</span>
            <div class="counter-controls">
                <button type="button" class="control-btn" onclick="var val=parseInt(document.getElementById('womenCount').innerText); if(val>0){document.getElementById('womenCount').innerText=val-1;}">-</button>
                <span class="counter-value" id="womenCount">1</span>
                <button type="button" class="control-btn" onclick="var val=parseInt(document.getElementById('womenCount').innerText); document.getElementById('womenCount').innerText=val+1;">+</button>
            </div>
        </div>
    </div>

    <button type="button" class="submit-btn" onclick="var name=document.getElementById('guestName').value.trim(); if(!name){alert('נא למלא שם מלא');}else{ var men=document.getElementById('menCount').innerText; var women=document.getElementById('womenCount').innerText; var status=(men==='0'&&women==='0')?'לא מגיע':'מגיע'; alert('תודה ' + name + '! אישור ההגעה נשלח בהצלחה ומחכה לכם.'); window.location.href='https://docs.google.com/forms/d/e/1FAIpQLSf__RAqcS81CkBbmSEH6TqslCMG3OxURhXNhUbhwfhYPHo-aQ/formResponse?entry.1843232049='+encodeURIComponent(name)+'&entry.170669176='+men+'&entry.507421160='+women; }">שלח אישור הגעה</button>
    
    <div class="footer-info">
        באולם "שבט הלוי"<br>נחל שורק 25, בית שמש
    </div>
</div>

</body>
</html>
